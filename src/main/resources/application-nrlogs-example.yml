# Example configuration for the nr-log-query tool.
# New Relic access is always required (that is where the logs live).
# For translation you can use: manual Kiro mode (no key), local Ollama (no key), or OpenAI/Anthropic.

nrlogs:
  new-relic:
    api-key: ${NEW_RELIC_API_KEY}
    # account-id is OPTIONAL. If omitted, it is auto-discovered from your API key.
    # Set it only if the key can access more than one account.
    # account-id: ${NEW_RELIC_ACCOUNT_ID}
    region: US            # US or EU
  llm:
    # Default automatic provider (used only if that provider is actually available):
    # ollama | openai | anthropic
    provider: ollama
  default-since: "30 minutes ago"
  default-limit: 50
  # app-name: checkout-service

spring:
  ai:
    # ---- Option A: Ollama (local, free, NO API key). Recommended for hands-free ask(). ----
    # Install Ollama, then: `ollama pull llama3.1`  (or another model), and run `ollama serve`.
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1

    # ---- Option B: OpenAI (needs a key + the spring-ai-starter-model-openai dependency) ----
    # openai:
    #   api-key: ${OPENAI_API_KEY}
    #   chat:
    #     options:
    #       model: gpt-4o

    # ---- Option C: Anthropic (needs a key + the spring-ai-starter-model-anthropic dependency) ----
    # anthropic:
    #   api-key: ${ANTHROPIC_API_KEY}
    #   chat:
    #     options:
    #       model: claude-sonnet-4-5

# ---- Option D: Manual "Kiro" mode - needs NOTHING above under spring.ai ----
# In the debugger: NrLogs.prompt("your question")  ->  paste into Kiro  ->  NrLogs.nrql("<result>")
