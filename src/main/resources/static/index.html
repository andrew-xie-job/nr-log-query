<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NR Log Search</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="wrap">
    <h1 class="logo">NR<span>Log</span>Search</h1>
    <p class="tagline">Ask your New Relic logs a question in plain English.</p>

    <form id="searchForm" class="search">
      <div class="controls">
        <label class="field">
          <span>Account</span>
          <select id="account"></select>
        </label>
        <label class="field">
          <span>Mode</span>
          <select id="mode">
            <option value="english" selected>English</option>
            <option value="nrql">NRQL</option>
          </select>
        </label>
      </div>

      <div id="englishRow" class="box">
        <input id="question" type="text" autocomplete="off"
               placeholder="e.g. errors from the payment service in the last hour" />
        <button id="translateBtn" type="submit">Translate</button>
      </div>

      <div id="nrqlRow" class="nrql-edit" hidden>
        <div class="nrql-head">
          <span class="nrql-label">NRQL</span>
          <span id="explanation" class="explanation"></span>
        </div>
        <textarea id="nrql" rows="4" spellcheck="false"
                  placeholder="SELECT timestamp, level, message FROM Log SINCE 1 hour ago LIMIT 20"></textarea>
        <div class="nrql-actions">
          <button id="runBtn" type="button">Run</button>
          <span class="nrql-tip">Edit the query if you like, then Run.</span>
        </div>
      </div>

      <div id="hint" class="hint"></div>
    </form>

    <section id="status" class="status"></section>
    <section id="results" class="results"></section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
